<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>:3</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap');
    body {
      font-family: 'Inter', sans-serif;
    }
  </style>
</head>
<body class="bg-black text-white flex flex-col items-center justify-center min-h-screen px-4 py-10 space-y-8">

  <!-- Title -->
  <h1 class="text-4xl font-bold text-white mb-2">:3</h1>

  <!-- Section Heading -->
  <p class="text-gray-400">socialsss</p>

  <!-- Social Buttons -->
  <div class="flex flex-col gap-4 w-full max-w-xs">
    <a href="https://www.tiktok.com/@copyright.txt" target="_blank"
       class="bg-white text-black flex items-center justify-between px-4 py-3 rounded-2xl hover:scale-105 transition transform">
      <div class="flex items-center gap-3">
        <i data-lucide="music-3"></i>
        <span class="font-semibold">TikTok</span>
      </div>
      <span>@copyright.txt</span>
    </a>

    <a href="https://github.com/copyrighttxt" target="_blank"
       class="bg-gray-800 text-white flex items-center justify-between px-4 py-3 rounded-2xl hover:scale-105 transition transform">
      <div class="flex items-center gap-3">
        <i data-lucide="github"></i>
        <span class="font-semibold">GitHub</span>
      </div>
      <span>@copyrighttxt</span>
    </a>

    <a href="https://www.youtube.com/@rlxw" target="_blank"
       class="bg-red-600 text-white flex items-center justify-between px-4 py-3 rounded-2xl hover:scale-105 transition transform">
      <div class="flex items-center gap-3">
        <i data-lucide="youtube"></i>
        <span class="font-semibold">YouTube</span>
      </div>
      <span>@rlxw</span>
    </a>

    <a href="https://twitter.com/copyrighttxt" target="_blank"
       class="bg-blue-500 text-white flex items-center justify-between px-4 py-3 rounded-2xl hover:scale-105 transition transform">
      <div class="flex items-center gap-3">
        <i data-lucide="twitter"></i>
        <span class="font-semibold">Twitter</span>
      </div>
      <span>@copyrighttxt</span>
    </a>
  </div>

  <!-- Audio Player -->
  <div class="mt-8 text-center">
    <p class="text-sm text-gray-400 mb-2">Now Playing: <span class="italic">bipolar</span></p>
    <audio controls autoplay loop class="w-full max-w-xs">
      <source src="https://github.com/copyrighttxt/copyrighttxt.github.io/raw/refs/heads/main/music.mp3" type="audio/mpeg">
      Your browser does not support the audio element.
    </audio>
  </div>

  <script>
    lucide.createIcons();
  </script>
