<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>:3</title>

  <!-- Tailwind CSS for utility classes -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Lucide for SVG icons -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap');
    body {
      font-family: 'Inter', sans-serif;
      background: #000;
      color: #fff;
    }

    /* Card around audio controls */
    .custom-audio-container {
      background: #1f2937;            /* gray-800 */
      border: 2px solid #4b5563;     /* gray-600 */
      border-radius: 1rem;           /* rounded-2xl */
      padding: .75rem;               /* p-3 */
      max-width: 320px;
      margin: 1rem auto;
      box-shadow: 0 4px 6px rgba(0,0,0,0.5);
    }

    /* Style native WebKit controls panel */
    .custom-audio::-webkit-media-controls-panel {
      background: #1f2937;           /* gray-800 */
      border-radius: .75rem;         /* rounded-xl */
    }
    /* Invert default icons for visibility */
    .custom-audio::-webkit-media-controls-play-button,
    .custom-audio::-webkit-media-controls-volume-slider,
    .custom-audio::-webkit-media-controls-mute-button {
      filter: invert(100%);
    }
    /* Firefox styling */
    .custom-audio::-moz-media-controls {
      background: #1f2937;
      border-radius: .75rem;
    }
  </style>
</head>

<body class="flex flex-col items-center justify-center min-h-screen px-4 py-10 space-y-8">

  <!-- Page Title -->
  <h1 class="text-4xl font-bold">:3</h1>

  <!-- Section Heading -->
  <p class="text-gray-400">socialsss</p>

  <!-- Social Buttons -->
  <div class="flex flex-col gap-4 w-full max-w-xs">
    <a href="https://www.tiktok.com/@copyright.txt" target="_blank"
       class="bg-white text-black flex items-center justify-between px-4 py-3 rounded-2xl hover:scale-105 transform transition">
      <div class="flex items-center gap-3">
        <i data-lucide="music-3"></i>
        <span class="font-semibold">TikTok</span>
      </div>
      <span>@copyright.txt</span>
    </a>
    <a href="https://github.com/copyrighttxt" target="_blank"
       class="bg-gray-800 text-white flex items-center justify-between px-4 py-3 rounded-2xl hover:scale-105 transform transition">
      <div class="flex items-center gap-3">
        <i data-lucide="github"></i>
        <span class="font-semibold">GitHub</span>
      </div>
      <span>@copyrighttxt</span>
    </a>
    <a href="https://www.youtube.com/@rlxw" target="_blank"
       class="bg-red-600 text-white flex items-center justify-between px-4 py-3 rounded-2xl hover:scale-105 transform transition">
      <div class="flex items-center gap-3">
        <i data-lucide="youtube"></i>
        <span class="font-semibold">YouTube</span>
      </div>
      <span>@rlxw</span>
    </a>
    <a href="https://twitter.com/copyrighttxt" target="_blank"
       class="bg-blue-500 text-white flex items-center justify-between px-4 py-3 rounded-2xl hover:scale-105 transform transition">
      <div class="flex items-center gap-3">
        <i data-lucide="twitter"></i>
        <span class="font-semibold">Twitter</span>
      </div>
      <span>@copyrighttxt</span>
    </a>
  </div>

  <!-- Custom Audio Player -->
  <div class="custom-audio-container text-center">
    <p class="text-sm text-gray-400 mb-2">Now Playing: <span class="italic">bipolar</span></p>
    <audio id="bg-audio" class="custom-audio w-full" controls autoplay loop muted>
      <source src="https://github.com/copyrighttxt/copyrighttxt.github.io/raw/refs/heads/main/music.mp3" type="audio/mpeg">
      Your browser does not support the audio element.
    </audio>
  </div>

  <script>
    // Render icons
    lucide.createIcons();
    // On load, unmute & play—fallback if autoplay was blocked
    window.addEventListener('load', () => {
      const audio = document.getElementById('bg-audio');
      audio.muted = false;
      audio.play().catch(() => {
        console.warn('Autoplay prevented; awaiting user interaction to play audio.');
      });
    });
  </script>
</body>
</html>
