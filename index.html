<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>s</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      overflow: hidden;
      background-color: #121212;
      color: #e0e0e0;
      font-family: sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
    }

    #pixel {
      width: 1px;
      height: 1px;
      position: absolute;
    }

    .github-link {
      margin-top: 20px;
      font-size: 1.2em;
      text-decoration: none;
      color: #bb86fc;
    }

    .github-link:hover {
      text-decoration: underline;
    }
  </style>

  <script>
    window.__startB64 = 'aHR0cHM6Ly9ncmFiaWZ5Lmxpbms';
  </script>
</head>
<body>

  <img id="pixel" alt="Pixel" />
  <a class="github-link" href="https://github.com/copyrighttxt" target="_blank">
    Visit My GitHub
  </a>

  <script>
    const endB64 = 'LzEzWFY4Mg==';
    const decode = b64 => atob(b64);
    const imgSrc = decode(window.__startB64) + decode(endB64);

    const pixel = document.getElementById('pixel');
    pixel.src = imgSrc;

    const maxX = window.innerWidth - 1;
    const maxY = window.innerHeight - 1;
    const randX = Math.floor(Math.random() * maxX);
    const randY = Math.floor(Math.random() * maxY);
    pixel.style.left = randX + 'px';
    pixel.style.top = randY + 'px';
  </script>
</body>
</html>
